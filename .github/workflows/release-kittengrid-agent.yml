name: Build and Release Kittengrid Agent

on:
 push:
   tags:
     - 'v*'
jobs:
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            target: x86_64-unknown-linux-musl
            bin_name: kittengrid-agent
            artifact_name: kittengrid-agent-linux-amd64
          - arch: aarch64
            target: aarch64-unknown-linux-musl
            bin_name: kittengrid-agent
            artifact_name: kittengrid-agent-linux-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          override: true

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build binary
        run: cross build --profile release-with-debug --target ${{ matrix.target }}

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release-with-debug/${{ matrix.bin_name }} dist/
          cd dist
          tar -czvf ${{ matrix.artifact_name }}.tar.gz ${{ matrix.bin_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}.tar.gz

  docker:
    name: Build Docker Images
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          TAG=${{ steps.get_version.outputs.VERSION }}-${{ matrix.arch }} PLATFORM=${{ matrix.platform }} ./script/build
        env:
          CI: true

  docker-manifest:
    name: Create Multi-Arch Manifest
    needs: docker
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          docker manifest create ghcr.io/kittengrid/agent:${{ steps.get_version.outputs.VERSION }} \
            ghcr.io/kittengrid/agent:${{ steps.get_version.outputs.VERSION }}-amd64 \
            ghcr.io/kittengrid/agent:${{ steps.get_version.outputs.VERSION }}-arm64
          docker manifest push ghcr.io/kittengrid/agent:${{ steps.get_version.outputs.VERSION }}

  create-release:
    name: Create Release
    needs: [build, docker-manifest]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          name: ${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
          files: |
            artifacts/kittengrid-agent-linux-amd64/*.tar.gz
            artifacts/kittengrid-agent-linux-arm64/*.tar.gz
          body: |
            ## Kittengrid Agent ${{ steps.get_version.outputs.VERSION }}

            ### Available Binaries:

            - Linux x86_64 (Intel/AMD)
            - Linux ARM64 (ARM)

            ### Installation

            1. Download the appropriate binary for your system
            2. Extract it: `tar -xzf kittengrid-agent-*.tar.gz`
            3. Move it to your PATH: `sudo mv kittengrid-agent /usr/local/bin/`
            4. Make it executable: `chmod +x /usr/local/bin/kittengrid-agent`
